name: Finalize Phase 1

on:
  push:
    branches:
      - feat/provider-neutral-runtime-completion

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout completion branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct exact reviewed sources
        shell: bash
        run: |
          set -euo pipefail

          cat .github/reconstruction/taskCoordinator.test.part-* \
            > src/coordinator/taskCoordinator.test.ts

          echo '0a1ff5328511aa82cfac345dadfc99435b201c551c86a1854647fc207d17bff5  src/coordinator/taskCoordinator.test.ts' \
            | sha256sum -c -
          test "$(git hash-object src/coordinator/taskCoordinator.test.ts)" \
            = '7f77d581870011b0c0ab3a54351b1486c3f77aa7'

          python - <<'PY'
          from pathlib import Path
          import hashlib

          path = Path('src/types.ts')
          raw = path.read_bytes()
          current = hashlib.sha1(b'blob ' + str(len(raw)).encode() + b'\0' + raw).hexdigest()
          assert current == '13433db1095281ff1c7e920de438cd22003a911c', current

          lines = raw.decode().splitlines(keepends=True)
          for index in sorted((18, 19, 113, 114), reverse=True):
              del lines[index]
          path.write_text(''.join(lines))

          updated = path.read_bytes()
          result = hashlib.sha1(b'blob ' + str(len(updated)).encode() + b'\0' + updated).hexdigest()
          assert result == '3260c3fc99c64783ac26400cf8540b49dc466ae3', result
          PY

      - name: Regenerate locked package metadata
        run: |
          npm install --package-lock-only --ignore-scripts
          node - <<'NODE'
          const lock = require('./package-lock.json');
          if (lock.name !== 'discord-agent') throw new Error('Unexpected lockfile package name');
          if (lock.packages?.['']?.engines?.node !== '>=22') throw new Error('Missing Node 22 engine');
          NODE

      - name: Install locked dependencies
        run: npm ci

      - name: Run complete test suite
        run: npm test

      - name: Build
        run: npm run build

      - name: Remove reconstruction scaffolding
        run: |
          rm -rf .github/reconstruction
          rm .github/workflows/finalize-phase1.yml

      - name: Commit verified completion
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: verify complete provider-neutral foundation'
          git push origin HEAD:feat/provider-neutral-runtime-completion
