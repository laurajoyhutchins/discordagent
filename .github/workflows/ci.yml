name: CI

on:
  push:
    branches:
      - main
      - feat/provider-neutral-foundation
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
