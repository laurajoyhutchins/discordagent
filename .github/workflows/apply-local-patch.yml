name: Apply local implementation patch

on:
  push:
    branches:
      - feat/provider-neutral-foundation

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/provider-neutral-foundation
          fetch-depth: 0

      - name: Apply staged patch
        shell: bash
        run: |
          set -euo pipefail
          plain_patch=.github/patches/current.patch
          encoded_patch=.github/patches/current.patch.gz.b64
          ready_file=.github/patches/current.patch.ready

          if [[ -f "$ready_file" ]] && compgen -G '.github/patches/current.patch.part-*' > /dev/null; then
            cat .github/patches/current.patch.part-* \
              | base64 --decode \
              | gzip --decompress > /tmp/current.patch
            rm .github/patches/current.patch.part-* "$ready_file"
          elif [[ -f "$plain_patch" ]]; then
            cp "$plain_patch" /tmp/current.patch
            rm "$plain_patch"
          elif [[ -f "$encoded_patch" ]]; then
            base64 --decode "$encoded_patch" | gzip --decompress > /tmp/current.patch
            rm "$encoded_patch"
          else
            echo "Patch is not ready."
            exit 0
          fi

          git apply --check /tmp/current.patch
          git apply /tmp/current.patch

      - name: Commit synchronized task
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && [[ -z "$(git status --porcelain)" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: synchronize reviewed implementation"
          git push origin HEAD:feat/provider-neutral-foundation
