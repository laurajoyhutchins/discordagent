name: Bug report
description: Report reproducible incorrect behavior or a regression.
title: ""
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Do not include provider credentials, Discord tokens, OAuth codes, private repository contents, or unredacted logs.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the incorrect behavior and its impact.
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: State what happened, including relevant task, provider, adapter, or Discord surface.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: State what should have happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure...
        2. Run...
        3. Observe...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Blocks normal operation
        - Breaks an important workflow
        - Degraded behavior with a workaround
        - Cosmetic or low-impact
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Node version, provider, Discord surface, and relevant configuration names without secrets.

  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence
      description: Add bounded logs, screenshots, or error output after removing secrets and private data.
      render: shell

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] A regression test reproduces the failure before the fix.
        - [ ] The fix preserves provider-neutral and authorization boundaries.
        - [ ] Relevant documentation or runbooks are updated.
    validations:
      required: true
