name: PR16 Reconciliation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  reconcile:
    if: github.head_ref == 'codex/discord-capabilities-control-cards'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/discord-capabilities-control-cards
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reconciliation
        shell: bash
        run: |
          set -o pipefail
          node scripts/prepare-reconcile-pr16-build.mjs 2>&1 | tee reconcile.log

      - name: Refresh lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Check whitespace
        run: git diff --check

      - name: Remove one-time repair machinery
        run: rm scripts/reconcile-pr16.mjs scripts/prepare-reconcile-pr16.mjs scripts/prepare-reconcile-pr16-build.mjs .github/workflows/pr16-repair.yml

      - name: Commit repaired branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reconcile settings and capabilities with OpenCode"
          git push origin HEAD:codex/discord-capabilities-control-cards

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr16-reconciliation-logs
          path: |
            reconcile.log
            test.log
            build.log
          if-no-files-found: ignore
          retention-days: 7
