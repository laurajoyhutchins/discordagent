name: CI

on:
  push:
    branches:
      - main
      - feat/provider-neutral-foundation
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Upload clean source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ github.sha }}
          path: |
            .
            !.git/**
            !node_modules/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Commit generated lockfile
        if: github.event_name == 'push' && github.ref_name == 'feat/provider-neutral-foundation'
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: update package lock [skip ci]"
          git push origin HEAD:feat/provider-neutral-foundation

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
