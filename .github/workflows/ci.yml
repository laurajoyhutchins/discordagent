name: CI

on:
  push:
    branches:
      - main
      - feat/provider-neutral-foundation
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test > test-errors.txt 2>&1

      - name: Upload test diagnostics
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-errors
          path: test-errors.txt

      - name: Fail failed tests
        if: steps.tests.outcome == 'failure'
        run: cat test-errors.txt && exit 1

      - name: Build
        if: steps.tests.outcome == 'success'
        run: npm run build
