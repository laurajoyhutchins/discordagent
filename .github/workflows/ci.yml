name: CI

on:
  push:
    branches:
      - main
      - feat/provider-neutral-foundation
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Export verified source snapshot
        if: github.head_ref == 'feat/provider-neutral-runtime-completion'
        uses: actions/upload-artifact@v4
        with:
          name: verified-phase1-source
          path: |
            .
            !.git
            !node_modules
            !dist
            !src/data/*.sqlite*
          include-hidden-files: true
          retention-days: 1
