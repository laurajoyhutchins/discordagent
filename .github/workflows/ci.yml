name: CI

on:
  push:
    branches:
      - main
      - feat/provider-neutral-foundation
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Package dependency tree
        run: tar -czf node_modules.tgz node_modules

      - name: Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: node-modules-${{ github.sha }}
          path: node_modules.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
