name: Recovery Export

on:
  push:
    branches:
      - recovery/export-main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove Git metadata
        run: rm -rf .git
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: discordagent-main-source
          path: .
          include-hidden-files: true
          retention-days: 1
